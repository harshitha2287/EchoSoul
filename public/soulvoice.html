<!DOCTYPE html>
<html>

<head>

<title>SoulVoice Journal</title>

<link rel="stylesheet" href="css/style.css">

<style>

.journalBox{

width:80%;
max-width:700px;

margin:auto;

background:white;

padding:25px;

border-radius:25px;

box-shadow:0 10px 25px rgba(0,0,0,0.15);

}

#journal{

width:100%;

height:140px;

border:none;

border-radius:15px;

padding:15px;

background:#f6f8ff;

font-size:16px;

resize:none;

}

.entry{

background:#fff;

margin-top:15px;

padding:15px;

border-radius:15px;

box-shadow:0 5px 10px rgba(0,0,0,0.1);

}

.entryDate{

font-size:12px;

color:#888;

margin-bottom:5px;

}

.saveBtn{

margin-top:10px;

}

</style>

</head>

<body>

<h1>SoulVoice Journal 📓</h1>

<div class="journalBox">

<textarea id="journal" placeholder="Write your thoughts here..."></textarea>

<br>

<button class="saveBtn" onclick="saveEntry()">Save Entry</button>

<h3>Your Journal</h3>

<div id="entries"></div>

</div>

<script src="js/soulvoice.js"></script>

</body>

</html>
